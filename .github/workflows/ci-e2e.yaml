name: CI E2E Tests Action
on:
  workflow_call:
jobs:
    test-e2e:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Build application
              run: docker compose -f docker-compose.yaml -f docker-compose.e2e.yaml up -d 
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
                cache: 'pip'
            - name: Install test dependencies
              run: pip install --no-cache-dir --upgrade -r e2e-testing/requirements.txt
            - name: Run E2E test
              run: pytest e2e-testing/ --html=report.html --self-contained-html
            - name: Save report
              uses: actions/upload-artifact@v7
              if: always()
              with:
                name: e2e-test-report
                path: report.html